name: Release
"on":
  workflow_dispatch:
    inputs:
      release_type:
        description: Release bump type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - exact
      exact_version:
        description: Exact semantic version when release_type=exact
        required: false
        type: string
      validate_only:
        description: Run release rehearsal without creating commit or tag
        required: true
        default: false
        type: boolean
permissions:
  contents: write
  id-token: write
concurrency:
  group: release-main
  cancel-in-progress: false
jobs:
  release:
    runs-on: ubuntu-22.04
    outputs:
      target_version: ${{ steps.sync_versions.outputs.target_version }}
    env:
      RELEASE_TYPE: ${{ inputs.release_type }}
      EXACT_VERSION: ${{ inputs.exact_version }}
    steps:
      - name: Require main workflow ref
        env:
          GITHUB_REF_VALUE: ${{ github.ref }}
        run: |
          if [[ "$GITHUB_REF_VALUE" != "refs/heads/main" ]]; then
            echo "Release runs must start from refs/heads/main," \
              "got $GITHUB_REF_VALUE" >&2
            exit 1
          fi
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Configure authenticated origin remote
        env:
          GITHUB_TOKEN_VALUE: ${{ github.token }}
        run: |
          if [[ -z "$GITHUB_TOKEN_VALUE" ]]; then
            echo "No GITHUB_TOKEN available for authenticated origin remote" >&2
            exit 1
          fi
          git remote set-url origin \
            "https://x-access-token:${GITHUB_TOKEN_VALUE}@github.com/${GITHUB_REPOSITORY}.git"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - name: Install build tools
        run: python -m pip install --upgrade build twine
      - name: Verify checkout matches latest origin/main
        id: verify_main
        run: |
          git fetch --no-tags origin main
          head_sha="$(git rev-parse HEAD)"
          remote_main_sha="$(git rev-parse origin/main)"
          if [[ "$head_sha" != "$remote_main_sha" ]]; then
            echo "Release must start from latest origin/main." >&2
            echo "HEAD=$head_sha" >&2
            echo "origin/main=$remote_main_sha" >&2
            exit 1
          fi
          echo "base_main_sha=$remote_main_sha" >> "$GITHUB_OUTPUT"
      - name: Rehearse requested release versioning locally
        run: |
          cmd=(
            uv run python -m extract.release_versioning
            --release-type "$RELEASE_TYPE"
            --dry-run
          )
          if [[ "$RELEASE_TYPE" == "exact" ]]; then
            if [[ -z "$EXACT_VERSION" ]]; then
              echo "exact_version is required when release_type=exact" >&2
              exit 1
            fi
            cmd+=(--exact-version "$EXACT_VERSION")
          fi
          "${cmd[@]}"
      - name: Sync release versions
        id: sync_versions
        run: |
          cmd=(
            uv run python -m extract.release_versioning
            --release-type "$RELEASE_TYPE"
            --github-output "$GITHUB_OUTPUT"
          )
          if [[ "$RELEASE_TYPE" == "exact" ]]; then
            if [[ -z "$EXACT_VERSION" ]]; then
              echo "exact_version is required when release_type=exact" >&2
              exit 1
            fi
            cmd+=(--exact-version "$EXACT_VERSION")
          fi
          "${cmd[@]}"
      - name: Run pytest
        run: uv run pytest python/tests
      - name: Run Rust tests
        run: cargo test --manifest-path rust/Cargo.toml
      - name: Build Python distributions
        run: python -m build
      - name: Check distributions
        run: python -m twine check dist/*
      - name: Check version consistency
        run: uv run python -m extract.release_versioning --check
      - name: Guard tracked working tree changes
        run: |
          python - <<'PY'
          import subprocess

          allowed = {
              "pyproject.toml",
              "rust/Cargo.lock",
              "rust/Cargo.toml",
              "uv.lock",
          }
          result = subprocess.run(
              ["git", "status", "--porcelain", "--untracked-files=no"],
              capture_output=True,
              text=True,
              check=True,
          )
          bad = []
          for line in result.stdout.splitlines():
              path = line[3:]
              if path not in allowed:
                  bad.append(line)
          if bad:
              print("Unexpected tracked changes after release validation:")
              for line in bad:
                  print(line)
              raise SystemExit(1)
          PY
      - name: Re-check origin/main before creating release
        env:
          BASE_MAIN_SHA: ${{ steps.verify_main.outputs.base_main_sha }}
        run: |
          git fetch --no-tags origin main
          remote_main_sha="$(git rev-parse origin/main)"
          if [[ "$remote_main_sha" != "$BASE_MAIN_SHA" ]]; then
            echo "origin/main moved during release run." >&2
            echo "start=$BASE_MAIN_SHA" >&2
            echo "current=$remote_main_sha" >&2
            exit 1
          fi
      - name: Create and push release commit
        if: ${{ !inputs.validate_only }}
        env:
          TARGET_VERSION: ${{ steps.sync_versions.outputs.target_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml rust/Cargo.toml rust/Cargo.lock uv.lock
          git commit -m "chore: release v$TARGET_VERSION"
          git tag "v$TARGET_VERSION"
          git push --atomic origin HEAD:main "v$TARGET_VERSION"
      - name: Create GitHub release
        if: ${{ !inputs.validate_only }}
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_VERSION: ${{ steps.sync_versions.outputs.target_version }}
        run: |
          gh release create "v$TARGET_VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --title "v$TARGET_VERSION" \
            --generate-notes \
            --verify-tag
      - name: Report validate-only completion
        if: ${{ inputs.validate_only }}
        env:
          TARGET_VERSION: ${{ steps.sync_versions.outputs.target_version }}
        run: |
          echo "Validated release workflow for v$TARGET_VERSION" \
            "without creating commit or tag."
  package-and-publish:
    name: Package and publish release
    needs: release
    if: ${{ !inputs.validate_only }}
    uses: ./.github/workflows/package.yml
    permissions:
      contents: read
      id-token: write
    with:
      publish_to_pypi: true
      checkout_ref: v${{ needs.release.outputs.target_version }}
