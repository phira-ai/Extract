name: Package and publish
"on":
  workflow_dispatch:
  workflow_call:
    inputs:
      publish_to_pypi:
        description: "Publish built distributions to PyPI"
        required: false
        default: false
        type: boolean
      checkout_ref:
        description: "Git ref to package"
        required: false
        default: ""
        type: string
  release:
    types:
      - published
permissions:
  contents: read
jobs:
  sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref || github.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: python -m pip install --upgrade build twine
      - name: Build sdist
        run: python -m build --sdist
      - name: Check sdist metadata
        run: python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*
  wheels:
    name: Wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref || github.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cibuildwheel
        run: python -m pip install --upgrade cibuildwheel twine
      - name: Build wheels
        env:
          CIBW_BUILD: "cp310-*"
          CIBW_SKIP: "*-musllinux* pp*"
          CIBW_TEST_COMMAND: "extract --help"
          CIBW_BEFORE_ALL_LINUX: |
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs |
              sh -s -- -y --profile minimal --default-toolchain stable
          CIBW_ENVIRONMENT_LINUX: 'PATH="$HOME/.cargo/bin:$PATH"'
        run: python -m cibuildwheel --output-dir dist
      - name: Check wheel metadata
        run: python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*
  publish-pypi:
    name: Publish to PyPI
    needs: [sdist, wheels]
    if: |
      ${{
        github.event_name == 'release' &&
        github.actor != 'github-actions[bot]' ||
        github.event_name == 'workflow_call' &&
        inputs.publish_to_pypi
      }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
